<div class="login-container">
  <div class="circle top-left"></div>
  <div class="circle bottom-right"></div>

  <div class="login-wrapper">
    <header class="login-header">
      <div class="brand">
        <h1 class="site-name">Dev Tracker</h1>
        <p class="welcome-text">Security First, Developer</p>
      </div>
      <button class="btn-logout-ghost" routerLink="/auth/login">Back to Login</button>
    </header>

    <div class="main-content-layout">
      <main class="login-content">
        <h2 class="form-title">Update Password</h2>
        <p class="description">Final step! Enter your OTP and choose you strong new password.</p>

        <form [formGroup]="formData" (ngSubmit)="changePassword()">
          
          <div class="form-row">
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="dev@example.com">
          </div>

          <div class="form-row">
            <label>OTP Code</label>
            <input type="text" formControlName="otp" placeholder="6-digit verification code">
          </div>

          <div class="form-row">
            <label>New Password</label>
            <input type="password" formControlName="newPassword" placeholder="••••••">
          </div>

          <button type="submit" class="btn-submit" [disabled]="formData.invalid || isLoading">
             <span *ngIf="!isLoading" class="btn-content">
                <i class="fa-solid fa-circle-dot"></i> Update & Verify
             </span>
             <span *ngIf="isLoading" class="spinner"></span>
          </button>
        </form>
      </main>

      <aside class="login-aside">
        <div class="aside-card">
          <div class="card-header">
            <div class="icon-circle">
              <i class="fa-solid fa-shield-halved"></i>
            </div>
            <div class="card-info">
              <h3>Secure Update</h3>
              <span>Auth Protocol v2.4</span>
            </div>
          </div>
          <p class="card-text">
            Ensure your new password contains at least 8 characters a mix letters and numbers for maximum security.
          </p>
          <div class="card-icons">
            <i class="fa-solid fa-shield-check"></i>
            <i class="fa-solid fa-lock"></i>
            <i class="fa-solid fa-bolt"></i>
          </div>
          <button class="btn-outline">Security Documentation</button>
        </div>
      </aside>
    </div>
  </div>
</div>
