<section class="gh-success">
  <!-- Ambient background blobs -->
  <div class="gh-success__blob blob-1"></div>
  <div class="gh-success__blob blob-2"></div>

  <!-- Particle ring burst -->
  <div class="particle-ring" #ring>
    <div class="particle" *ngFor="let p of [].constructor(12); let i = index"
         [style.transform]="'rotate(' + (i * 30) + 'deg) translateY(-90px)'"></div>
  </div>

  <!-- Main content card -->
  <div class="gh-success__card" #contentWrap>

    <!-- Animated checkmark SVG -->
    <div class="gh-success__check-wrap">
      <svg class="gh-success__check-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer glow circle -->
        <circle cx="60" cy="60" r="54" class="check-bg"/>
        <!-- Animated stroke circle -->
        <circle #checkmark cx="60" cy="60" r="50" class="check-stroke"
                fill="none" stroke-width="3" stroke-linecap="round"/>
        <!-- Checkmark path -->
        <polyline class="check-tick" points="35,63 52,80 85,45"
                  fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Badge -->
    <div class="gh-success__pro-badge" *ngIf="trialStarted">
      ✨ Pro Trial Activated
    </div>

    <!-- Headline -->
    <h1 class="gh-success__title">
      GitHub<br><span>Connected</span>
    </h1>

    <!-- Sub info -->
    <p class="gh-success__sub" *ngIf="githubLogin">
      Logged in as <strong class="gh-success__handle">@{{ githubLogin }}</strong>
    </p>

    <!-- Trial end date chip -->
    <div class="gh-success__date-chip" *ngIf="formattedEndDate">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Trial active until <strong>{{ formattedEndDate }}</strong>
    </div>

    <!-- Feature highlights -->
    <ul class="gh-success__features">
      <li>
        <span class="feat-icon">🔗</span>
        <span>Select and track your repositories</span>
      </li>
      <li>
        <span class="feat-icon">📊</span>
        <span>Real-time developer activity feed</span>
      </li>
      <li>
        <span class="feat-icon">🔔</span>
        <span>Commit & PR webhooks synced automatically</span>
      </li>
    </ul>

    <!-- CTA -->
    <button class="gh-success__btn" id="gh-success-dashboard-btn" (click)="goToDashboard()">
      Start using GitHub Features
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round" width="16" height="16">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
</section>
