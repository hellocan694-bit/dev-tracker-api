<div class="success-page-container">
  <div class="success-card-wrapper">
    <div class="success-card">
      
      <!-- Success Icon Animation -->
      <div *ngIf="!isVerifying && !error" class="success-icon-box">
        <svg class="success-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>

      <!-- Loading State -->
      <div *ngIf="isVerifying" class="verifying-loading-box">
        <svg class="spinner-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="loading-text">Verifying your subscription...</p>
      </div>

      <div class="card-body-content">
        <h2 class="status-heading" [class.error-heading]="error">
          {{ isVerifying ? 'Processing...' : (error ? 'Warning' : 'Payment Successful!') }}
        </h2>
        
        <p *ngIf="!isVerifying && !error" class="success-desc">
          Welcome to Pro! Your subscription is now active. You have full access to all premium features.
        </p>

        <p *ngIf="error" class="error-desc">
          {{ error }}
        </p>

        <button 
          (click)="goToDashboard()"
          [disabled]="isVerifying"
          class="btn-dashboard">
          Go to Dashboard
        </button>
      </div>
      
      <!-- Decorative background blur -->
      <div class="decorative-blur-blob"></div>
    </div>
  </div>
</div>
