<div
  #bannerEl
  class="trial-banner"
  [class.urgent]="urgencyClass === 'urgent'"
  [class.warning]="urgencyClass === 'warning'"
  *ngIf="isVisible && trialStatus"
>
  <!-- Left: Icon + text -->
  <div class="trial-banner__left">
    <div class="trial-banner__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14.93V18a1 1 0 0 1-2 0v-1.07A8 8 0 0 1 4.07 9H6a1 1 0 0 1 0 2 6 6 0 0 0 6 6zm0-8.86V9a1 1 0 0 1-2 0V8.07A6 6 0 0 0 6 14H4.07A8 8 0 0 1 13 8.07zM12 7a1 1 0 1 1 1-1 1 1 0 0 1-1 1z"/>
      </svg>
    </div>
    <div class="trial-banner__text">
      <span class="trial-banner__label">🚀 Pro Trial Active</span>
      <span class="trial-banner__sub">
        <strong>{{ trialStatus.daysRemaining }}</strong>
        {{ trialStatus.daysRemaining === 1 ? 'day' : 'days' }} remaining
        <span *ngIf="trialStatus.githubLogin" class="trial-banner__user">
          · @{{ trialStatus.githubLogin }}
        </span>
      </span>
    </div>
  </div>

  <!-- Centre: Progress bar -->
  <div class="trial-banner__progress-wrap">
    <div class="trial-banner__progress-bar">
      <div
        class="trial-banner__progress-fill"
        [style.width.%]="progressPercent"
      ></div>
    </div>
    <span class="trial-banner__progress-label">{{ progressPercent }}%</span>
  </div>

  <!-- Right: CTA -->
  <button class="trial-banner__cta" (click)="goToPricing()" id="trial-banner-upgrade-btn">
    Upgrade to Pro
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" width="14" height="14">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
</div>
