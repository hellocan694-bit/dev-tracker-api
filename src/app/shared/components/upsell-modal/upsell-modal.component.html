<div class="upsell-modal-backdrop" (click)="onBackdropClick($event)" aria-modal="true" role="dialog"
  aria-labelledby="upsell-title">
  <div class="upsell-modal" #modalCard>

    <!-- Shimmer border ring -->
    <div class="upsell-modal__ring"></div>

    <!-- Glow orb -->
    <div class="upsell-modal__orb"></div>

    <!-- Header -->
    <div class="upsell-modal__header">
      <div class="upsell-modal__lock-icon">
        <i class="bi bi-lock-fill"></i>
      </div>
      <h2 class="upsell-modal__title" id="upsell-title">Premium Feature</h2>
      <p class="upsell-modal__subtitle">
        <strong class="text-premium">{{ featureName }}</strong> is available exclusively on the PRO plan.
      </p>
    </div>

    <!-- Feature highlights -->
    <ul class="upsell-modal__perks">
      <li><i class="bi bi-check-circle-fill text-premium"></i> Unlimited projects &amp; real-time webhooks</li>
      <li><i class="bi bi-check-circle-fill text-premium"></i> Advanced analytics &amp; productivity charts</li>
      <li><i class="bi bi-check-circle-fill text-premium"></i> Custom webhook rules &amp; team invite manager</li>
      <li><i class="bi bi-check-circle-fill text-premium"></i> Priority support &amp; early feature access</li>
    </ul>

    <!-- CTA -->
    <button class="upsell-modal__cta" (click)="onUpgrade()" #ctaBtn>
      <i class="bi bi-gem me-2"></i>
      Upgrade to PRO Now
      <i class="bi bi-arrow-right ms-2"></i>
    </button>

    <!-- Dismiss -->
    <button class="upsell-modal__dismiss" (click)="close()" aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>

  </div>
</div>
